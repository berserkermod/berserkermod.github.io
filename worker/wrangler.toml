# BERSERKERMOD API — Cloudflare Worker
# Único backend de producción: licencias (códigos + Mercado Pago), backend del
# modo Coach (rutinas/shares/edits), proxy del Oracle e ingest de errores.
#
# Deploy: ver README-DEPLOY.md. Resumen:
#   1) npx wrangler login
#   2) npx wrangler kv namespace create BMOD_KV   → pegar el id abajo
#   3) npx wrangler secret put LICENSE_SECRET
#   4) npx wrangler secret put MP_ACCESS_TOKEN     (cuando conectes Mercado Pago)
#   5) npx wrangler secret put ADMIN_SECRET
#   6) npx wrangler deploy

name = "berserkermod-api"
main = "src/index.js"
compatibility_date = "2024-09-23"

# Vars públicas (no secretas). APP_ORIGIN se usa para los redirects de Mercado
# Pago y para CORS. Reemplazá por tu dominio final si usás uno propio.
[vars]
APP_ORIGIN = "https://berserkermod.github.io"
APP_PATH = "/BERSERKERMOD.html"
LANDING_URL = "https://berserkermod.github.io/"
ENABLE_HEALTH_SYNC = "false"
# Modelo que estructura los PDF de rutinas. Corre en Cloudflare Workers AI
# (GRATIS dentro de 10.000 neuronas/día, sin API key ni cuenta de terceros).
# Usamos el 70B porque lee bastante mejor las tablas/rutinas. Si necesitás gastar
# menos neuronas (más volumen) se puede bajar a "@cf/meta/llama-3.1-8b-instruct-fp8"
# o "@cf/meta/llama-4-scout-17b-16e-instruct". La conversión PDF→texto la hace
# env.AI.toMarkdown() (gratis para PDFs de texto) — ver el binding [ai] abajo.
# OJO: el ID debe EXISTIR en tu cuenta — verificá con `npx wrangler ai models`.
PARSE_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"

# Precio del Coach (pago único). Ponelo en PESOS (ARS) al cambio del día.
# Mientras esté en 0, el checkout devuelve 503 (no se puede comprar todavía).
# Ej: USD 18 ≈ poné el equivalente en ARS, p.ej. COACH_PRICE_ARS = "21600".
COACH_PRICE_ARS = "25000"
COACH_CURRENCY = "ARS"
COACH_TITLE = "BERSERKERMOD — Modo Coach (acceso completo)"

# KV: pegá el id que devuelve `wrangler kv namespace create BMOD_KV`.
# El preview_id es para `wrangler dev`; podés usar el mismo id o crear otro.
[[kv_namespaces]]
binding = "BMOD_KV"
id = "032b05ee75684a44bd0cfaa036d2c7be"
preview_id = "032b05ee75684a44bd0cfaa036d2c7be"

# Workers AI: motor gratuito del "Importar rutina desde PDF". No necesita id ni
# secret — con declarar el binding alcanza. La app lo usa para convertir el PDF a
# texto (env.AI.toMarkdown) y estructurarlo con un modelo Llama (env.AI.run).
[ai]
binding = "AI"
